<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Login Vendedores</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden;}
.LP{flex:0 0 50%;background:#FFFFFF;display:flex;align-items:center;justify-content:center;padding:40px;}
.FC{width:100%;max-width:400px;}
.logo-pill{display:inline-flex;align-items:center;gap:10px;background:#192318;border-radius:100px;padding:10px 22px;margin-bottom:36px;}
.logo-pill img{height:22px;width:auto;display:block;max-width:120px;object-fit:contain;}
h1{font-family:'DM Sans',sans-serif;font-size:32px;font-weight:800;color:#000;margin-bottom:8px;letter-spacing:-.5px;}
.sub{color:#4B5563;font-size:15px;margin-bottom:32px;line-height:1.5;}
.msg{display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;line-height:1.5;}
.flbl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.flbl svg{width:15px;height:15px;color:#9CA3AF;}
.inp{width:100%;padding:14px 16px;border:1.5px solid #C8C8C8;border-radius:11px;font-size:15px;font-family:'DM Sans',sans-serif;color:#374151;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:#2D5A27;box-shadow:0 0 0 3px rgba(45,90,39,.10);}
.inp::placeholder{color:#9CA3AF;}
.wrap{position:relative;margin-bottom:6px;}
.wrap .inp{padding-right:44px;}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF;display:flex;align-items:center;padding:0;}
.eye svg{width:16px;height:16px;}
.meta{display:flex;justify-content:space-between;align-items:center;margin:16px 0 24px;}
.rem{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#6B7280;}
.rem input{width:15px;height:15px;accent-color:#2D5A27;cursor:pointer;}
.fgt{font-size:13px;color:#2D5A27;font-weight:700;text-decoration:none;}
.fgt:hover{text-decoration:underline;}
.btn{width:100%;padding:15px;background:#192318;color:#FFFFFF;border:none;border-radius:11px;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;margin-bottom:16px;letter-spacing:-.2px;}
.btn:hover{background:#2D5A27;}
.or{text-align:center;color:#9CA3AF;font-size:13px;margin-bottom:16px;position:relative;}
.or::before,.or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#E5E7EB;}
.or::before{left:0;}.or::after{right:0;}
.goog{width:100%;padding:13px;background:#fff;border:1.5px solid #E5E7EB;border-radius:11px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:#374151;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s;margin-bottom:24px;}
.goog:hover{border-color:#2D5A27;}
.prm{text-align:center;font-size:14px;color:#6B7280;}
.prm a{color:#2D5A27;font-weight:700;text-decoration:none;}
.prm a:hover{text-decoration:underline;}
.RP{flex:1;background:#192318;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 40px 40px;overflow:hidden;color:#fff;}
.rtag{font-size:11px;letter-spacing:.16em;color:rgba(216,219,142,.6);text-transform:uppercase;font-weight:700;margin-bottom:16px;}
.rh{font-family:'Playfair Display',serif;font-size:clamp(32px,3.2vw,46px);font-weight:700;line-height:1.15;text-align:center;color:#fff;letter-spacing:-1px;max-width:380px;}
.rh em{font-style:italic;color:#D8DB8E;}
.circle{position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:520px;height:520px;background:rgba(45,90,39,.18);border-radius:50%;}
.circle2{position:absolute;bottom:-160px;left:50%;transform:translateX(-50%);width:380px;height:380px;background:rgba(216,219,142,.06);border-radius:50%;}
.badge{position:absolute;background:#fff;border-radius:14px;padding:11px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:#192318;z-index:2;box-shadow:0 4px 20px rgba(0,0,0,.18);}
.badge .ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.badge .ico svg{width:18px;height:18px;}
.badge .binfo{display:flex;flex-direction:column;}
.badge .bval{font-size:14px;font-weight:800;color:#192318;line-height:1.2;}
.badge .blbl{font-size:11px;font-weight:500;color:#6B7280;}
.b1{top:200px;left:16px;}
.b2{top:150px;right:10px;}
.b3{bottom:180px;right:10px;}
.b4{bottom:110px;left:16px;}
</style>
</head>
<body>

<div class="LP" style="position:relative;">
  <!-- Botão voltar -->
  <a href="index.html" style="position:absolute;top:28px;left:28px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#6B7280;text-decoration:none;z-index:10;transition:color .2s;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </a>

  <div class="FC">
    <div class="logo-pill"><img src="images/Hart_Tipografico_04.png" alt="Hart" style="height:22px;width:auto;display:block;max-width:110px;"/></div>
      <div style="display:inline-flex;align-items:center;gap:7px;background:rgba(216,219,142,0.15);border:1px solid rgba(200,169,110,0.35);border-radius:100px;padding:6px 14px;margin-bottom:20px;">
    <span style="width:7px;height:7px;border-radius:50%;background:#92710E;display:inline-block;flex-shrink:0;"></span>
    <span style="font-size:12px;font-weight:700;color:#92710E;letter-spacing:.05em;text-transform:uppercase;">Área do Vendedor</span>
  </div>
  <h1>Bem-vindo de volta</h1>
    <p class="sub">Entre no dashboard para acompanhar suas indicações e comissões</p>
    <div class="msg" id="msg"></div>
    <div class="flbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>E-mail</div>
    <div style="margin-bottom:16px;"><input class="inp" id="email" type="email" placeholder="seu@email.com" autocomplete="email"/></div>
    <div class="flbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Senha</div>
    <div class="wrap"><input class="inp" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/><button class="eye" type="button" onclick="togglePwd()" aria-label="Mostrar senha"><svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <div class="meta"><label class="rem"><input type="checkbox" id="rem"/><span>Lembrar de mim</span></label><a href="#" class="fgt" id="fgt">Esqueci minha senha</a></div>
    <button class="btn" id="btnEntrar" onclick="entrar()">Entrar no dashboard</button>
    <div class="or">ou</div>
    <button class="goog" onclick="entrarGoogle()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Continuar com Google</button>
    <p class="prm">Não tem conta? <a href="cadastro-vendedor.html">Criar conta de vendedor</a></p>
  </div>
</div>

<div class="RP" style="background:#192318;flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:100vh;overflow:hidden;">
  <div style="position:absolute;top:-120px;right:-120px;width:600px;height:600px;background:radial-gradient(circle,rgba(45,90,39,.30) 0%,transparent 65%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-100px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(45,90,39,.15) 0%,transparent 65%);pointer-events:none;"></div>
  <img src="images/Hart_Tipografico_04.png" alt="Hart" style="height:44px;max-width:200px;width:auto;display:block;position:relative;z-index:1;opacity:0.9;object-fit:contain;"/>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  "https://suntiyiqskhpppzxhuns.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnRpeWlxc2tocHBwenhodW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTg1NTQsImV4cCI6MjA4OTA5NDU1NH0.skzgdKsg_cdF4XuyIzM86w40PmiBPublYH0i_5vc3Lw"
);

// Se já tiver sessão E perfil de vendedor → vai direto pro dashboard
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: perfil } = await sb
    .from('usuarios')
    .select('id')
    .eq('user_id', session.user.id)
    .eq('tipo', 'vendedor')
    .maybeSingle();
  if (perfil) window.location.replace('dashboard-vendedor.html');
});

// ── TOGGLE SENHA ────────────────────────────────────────
function togglePwd() {
  const i = document.getElementById('password');
  const ic = document.getElementById('eyeIcon');
  const h = i.type === 'password';
  i.type = h ? 'text' : 'password';
  ic.innerHTML = h
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

// ── MENSAGEM ────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
  el.style.background = type === 'e' ? 'rgba(229,72,77,.10)' : 'rgba(48,164,108,.10)';
  el.style.color      = type === 'e' ? '#c0392b' : '#1e7e50';
  el.style.border     = '1px solid ' + (type === 'e' ? 'rgba(229,72,77,.25)' : 'rgba(48,164,108,.25)');
  el.style.borderRadius = '10px';
  el.style.lineHeight   = '1.5';
}

// ── LOGIN EMAIL/SENHA ───────────────────────────────────
async function entrar() {
  const btn = document.getElementById('btnEntrar');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email)    return showMsg('Preencha seu e-mail.', 'e');
  if (!password) return showMsg('Preencha sua senha.', 'e');

  btn.textContent = 'Entrando...';
  btn.disabled = true;

  // 1. Autenticar
  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    btn.textContent = 'Entrar no dashboard';
    btn.disabled = false;
    if (error.message === 'Email not confirmed' || error.message.includes('confirm'))
      return showMsg('Confirme seu e-mail antes de entrar. Verifique a caixa de entrada e o spam.', 'e');
    return showMsg('E-mail ou senha incorretos. Verifique e tente novamente.', 'e');
  }

  // 2. Verificar perfil de vendedor
  const { data: perfil } = await sb
    .from('usuarios')
    .select('id')
    .eq('user_id', data.user.id)
    .eq('tipo', 'vendedor')
    .maybeSingle();

  if (perfil) {
    // Perfil encontrado → dashboard
    showMsg('Login realizado! Redirecionando...', 's');
    setTimeout(() => window.location.replace('dashboard-vendedor.html'), 800);
    return;
  }

  // 3. Sem perfil de vendedor → tentar criar a partir dos metadados do cadastro
  const meta = data.user.user_metadata || {};
  if (meta.tipo === 'vendedor' && meta.nome) {
    const { error: insErr } = await sb.from('usuarios').insert({
      user_id:     data.user.id,
      tipo:        'vendedor',
      nome:        meta.nome,
      sobrenome:   meta.sobrenome || '',
      email:       data.user.email,
      telefone:    meta.telefone  || null,
      eh_corretor: meta.eh_corretor || false,
      creci:       meta.creci      || null,
      imobiliaria: meta.imobiliaria || null,
      categoria:   'bronze',
      referido_por: meta.referido_por || null,
    });

    if (!insErr) {
      showMsg('Conta ativada! Redirecionando...', 's');
      setTimeout(() => window.location.replace('dashboard-vendedor.html'), 800);
      return;
    }
  }

  // 4. Não tem conta de vendedor
  await sb.auth.signOut();
  btn.textContent = 'Entrar no dashboard';
  btn.disabled = false;
  showMsg('Você não tem conta de vendedor. Crie uma conta abaixo.', 'e');
}

// ── LOGIN GOOGLE ────────────────────────────────────────
async function entrarGoogle() {
  // Sinaliza que o OAuth vem do fluxo de vendedor
  sessionStorage.setItem('oauth_intent', 'vendedor');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard-vendedor.html' },
  });
  if (error) showMsg('Erro ao conectar com Google. Tente novamente.', 'e');
}

// ── RECUPERAR SENHA ─────────────────────────────────────
document.getElementById('fgt').onclick = async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) return showMsg('Digite seu e-mail acima para recuperar a senha.', 'e');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login-vendedor.html',
  });
  if (error) return showMsg(error.message, 'e');
  showMsg('E-mail de recuperação enviado! Verifique a caixa de entrada e o spam.', 's');
};

document.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
