<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Cadastro Vendedor</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;background:#F0EDE6;}
.LP{flex:0 0 50%;background:#FFFFFF;display:flex;align-items:flex-start;justify-content:center;padding:40px;overflow-y:auto;min-height:100vh;}
.FC{width:100%;max-width:400px;padding:20px 0;}
.logo-pill{display:inline-flex;align-items:center;gap:10px;background:#192318;border-radius:100px;padding:10px 22px;margin-bottom:32px;}
.logo-pill img{height:22px;width:auto;display:block;max-width:120px;object-fit:contain;}
h1{font-family:'DM Sans',sans-serif;font-size:30px;font-weight:800;color:#000;margin-bottom:8px;letter-spacing:-.5px;}
.sub{color:#4B5563;font-size:14px;margin-bottom:28px;line-height:1.5;}
.msg{display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;line-height:1.5;}
.ng{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.flbl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#111;text-transform:uppercase;letter-spacing:.04em;}
.flbl svg{width:14px;height:14px;color:#9CA3AF;}
.inp{width:100%;padding:13px 16px;border:1.5px solid #C8C8C8;border-radius:11px;font-size:15px;font-family:'DM Sans',sans-serif;color:#374151;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:#2D5A27;box-shadow:0 0 0 3px rgba(45,90,39,.10);}
.inp::placeholder{color:#9CA3AF;}
.wrap{position:relative;}.wrap .inp{padding-right:44px;}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF;display:flex;align-items:center;padding:0;}
.eye svg{width:16px;height:16px;}
.ps{display:flex;align-items:center;gap:10px;margin-top:5px;}
.ps-t{flex:1;height:3px;background:rgba(0,0,0,.08);border-radius:100px;overflow:hidden;}
.ps-f{height:100%;width:0;border-radius:100px;transition:width .3s,background .3s;}
.ps-l{font-size:11px;font-weight:600;color:#9CA3AF;min-width:48px;text-align:right;}
.terms{display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;font-size:13px;color:#6B7280;}
.terms input{width:15px;height:15px;accent-color:#2D5A27;cursor:pointer;flex-shrink:0;margin-top:2px;}
.terms a{color:#2D5A27;font-weight:700;text-decoration:none;}
.terms a:hover{text-decoration:underline;}
.btn{width:100%;padding:15px;background:#192318;color:#FFFFFF;border:none;border-radius:11px;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;margin-bottom:16px;letter-spacing:-.2px;}
.btn:hover{background:#2D5A27;}
.prm{text-align:center;font-size:14px;color:#6B7280;margin-top:4px;}
.prm a{color:#2D5A27;font-weight:700;text-decoration:none;}
.prm a:hover{text-decoration:underline;}
.corr-toggle{background:rgba(45,90,39,.06);border:1.5px solid rgba(45,90,39,.14);border-radius:11px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:600;color:#374151;user-select:none;}
.corr-toggle input{width:15px;height:15px;accent-color:#2D5A27;cursor:pointer;}
.corr-fields{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s cubic-bezier(.22,1,.36,1);overflow:hidden;}
.corr-fields>div{min-height:0;}
.RP{flex:1;background:#192318;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 40px 40px;overflow:hidden;color:#fff;}
.rtag{font-size:11px;letter-spacing:.16em;color:rgba(216,219,142,.6);text-transform:uppercase;font-weight:700;margin-bottom:16px;}
.rh{font-family:'Playfair Display',serif;font-size:clamp(30px,3vw,44px);font-weight:700;line-height:1.15;text-align:center;color:#fff;letter-spacing:-1px;max-width:380px;}
.rh em{font-style:italic;color:#D8DB8E;}
.circle{position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:520px;height:520px;background:rgba(45,90,39,.18);border-radius:50%;}
.circle2{position:absolute;bottom:-160px;left:50%;transform:translateX(-50%);width:380px;height:380px;background:rgba(216,219,142,.06);border-radius:50%;}
.badge{position:absolute;background:#fff;border-radius:14px;padding:11px 16px;display:flex;align-items:center;gap:10px;z-index:2;box-shadow:0 4px 20px rgba(0,0,0,.18);}
.badge .ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.badge .ico svg{width:18px;height:18px;}
.binfo{display:flex;flex-direction:column;}
.bval{font-size:14px;font-weight:800;color:#192318;line-height:1.2;}
.blbl{font-size:11px;font-weight:500;color:#6B7280;}
.b1{top:200px;left:16px;}.b2{top:150px;right:10px;}.b3{bottom:180px;right:10px;}.b4{bottom:110px;left:16px;}
</style>
</head>
<body>
<div class="LP" style="position:relative;">
  <!-- Botão voltar -->
  <a href="index.html" style="position:absolute;top:28px;left:28px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#6B7280;text-decoration:none;z-index:10;transition:color .2s;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </a>
<div class="FC" id="formSide">
  <div class="logo-pill"><img src="images/Hart_Tipografico_04.png" alt="Hart" style="height:22px;width:auto;display:block;max-width:110px;"/></div>
    <div style="display:inline-flex;align-items:center;gap:7px;background:rgba(216,219,142,0.15);border:1px solid rgba(200,169,110,0.35);border-radius:100px;padding:6px 14px;margin-bottom:20px;">
    <span style="width:7px;height:7px;border-radius:50%;background:#92710E;display:inline-block;flex-shrink:0;"></span>
    <span style="font-size:12px;font-weight:700;color:#92710E;letter-spacing:.05em;text-transform:uppercase;">Área do Vendedor</span>
  </div>
  <h1>Comece a indicar</h1>
  <p class="sub">Crie sua conta de vendedor Hart e comece a receber comissões</p>
  <div class="msg" id="msg"></div>
  <div class="ng">
    <div class="fg"><label class="flbl">Nome</label><input class="inp" id="fname" type="text" placeholder="João" autocomplete="given-name"/></div>
    <div class="fg"><label class="flbl">Sobrenome</label><input class="inp" id="lname" type="text" placeholder="Silva" autocomplete="family-name"/></div>
  </div>
  <div class="fg"><label class="flbl">E-mail</label><input class="inp" id="email" type="email" placeholder="seu@email.com" autocomplete="email"/></div>
  <div class="fg"><label class="flbl">Telefone / WhatsApp</label><input class="inp" id="phone" type="tel" placeholder="(11) 9 0000-0000" autocomplete="tel"/></div>
  <div class="fg"><label class="flbl">Link de indicação <span style="font-weight:400;color:#9CA3AF;text-transform:none;letter-spacing:0;">(opcional)</span></label><input class="inp" id="refLink" type="text" placeholder="Cole aqui o link de quem te indicou"/></div>
  <label class="corr-toggle"><input type="checkbox" id="isCor" onchange="document.getElementById('corFields').style.gridTemplateRows=this.checked?'1fr':'0fr'"/><span>Sou corretor de imóveis</span></label>
  <div class="corr-fields" id="corFields"><div>
    <div class="ng" style="margin-bottom:12px;">
      <div class="fg"><label class="flbl">CRECI</label><input class="inp" id="creci" type="text" placeholder="SP-000000"/></div>
      <div class="fg"><label class="flbl">Imobiliária</label><input class="inp" id="imob" type="text" placeholder="Opcional"/></div>
    </div>
  </div></div>
  <div class="fg">
    <label class="flbl">Senha</label>
    <div class="wrap"><input class="inp" id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/><button class="eye" type="button" onclick="togglePwd('password','e1')" aria-label="Mostrar senha"><svg id="e1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <div class="ps"><div class="ps-t"><div class="ps-f" id="sf"></div></div><span class="ps-l" id="sl"></span></div>
  </div>
  <div class="fg">
    <label class="flbl">Confirmar senha</label>
    <div class="wrap"><input class="inp" id="p2" type="password" placeholder="Repita a senha" autocomplete="new-password"/><button class="eye" type="button" onclick="togglePwd('p2','e2')" aria-label="Mostrar senha"><svg id="e2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
  </div>
  <label class="terms"><input type="checkbox" id="terms"/><span>Li e aceito os <a href="termos.html">Termos de Uso</a> e a <a href="privacidade.html">Política de Privacidade</a></span></label>
  <button class="btn" id="btnS" onclick="cadastrar()">Criar conta de vendedor</button>
  <p class="prm">Já tem conta? <a href="login-vendedor.html">Entrar como vendedor</a></p>
</div></div>

<div class="RP" style="background:#192318;flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:100vh;overflow:hidden;">
  <div style="position:absolute;top:-120px;right:-120px;width:600px;height:600px;background:radial-gradient(circle,rgba(45,90,39,.30) 0%,transparent 65%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-100px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(45,90,39,.15) 0%,transparent 65%);pointer-events:none;"></div>
  <img src="images/Hart_Tipografico_04.png" alt="Hart" style="height:44px;max-width:200px;width:auto;display:block;position:relative;z-index:1;opacity:0.9;object-fit:contain;"/>
</div>

<script>
const{createClient}=supabase;const sb=createClient("https://suntiyiqskhpppzxhuns.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnRpeWlxc2tocHBwenhodW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTg1NTQsImV4cCI6MjA4OTA5NDU1NH0.skzgdKsg_cdF4XuyIzM86w40PmiBPublYH0i_5vc3Lw");

const lvl=[{l:'',c:'',p:0},{l:'Fraca',c:'#E5484D',p:25},{l:'Média',c:'#F76B15',p:55},{l:'Boa',c:'#30A46C',p:80},{l:'Forte',c:'#2D5A27',p:100}];
function str(p){if(!p)return 0;let s=1;if(p.length>=8)s++;if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return Math.min(s,4);}
document.getElementById("password").addEventListener("input",function(){const lv=str(this.value),{l,c,p}=lvl[lv];document.getElementById("sf").style.width=p+"%";document.getElementById("sf").style.background=c;document.getElementById("sl").textContent=l;document.getElementById("sl").style.color=c;});
document.getElementById("p2").addEventListener("input",function(){if(!this.value){this.style.borderColor="";return;}const m=this.value===document.getElementById("password").value;this.style.borderColor=m?"#30A46C":"#E5484D";this.style.boxShadow=m?"0 0 0 3px rgba(48,164,108,.10)":"0 0 0 3px rgba(229,72,77,.10)";});
function togglePwd(id,ic){const i=document.getElementById(id),icon=document.getElementById(ic),h=i.type==="password";i.type=h?"text":"password";icon.innerHTML=h?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
function msg(t,tp){const e=document.getElementById("msg");e.textContent=t;e.style.display="block";e.style.background=tp==="e"?"rgba(229,72,77,.10)":"rgba(48,164,108,.10)";e.style.color=tp==="e"?"#c0392b":"#1e7e50";e.style.border="1px solid "+(tp==="e"?"rgba(229,72,77,.25)":"rgba(48,164,108,.25)");e.style.borderRadius="10px";}
function confirmado(email){document.getElementById("formSide").innerHTML=`<div class="logo-pill"><img src="images/Hart_Tipografico_04.png" alt="Hart" style="height:22px;width:auto;display:block;max-width:110px;"/></div><h1>Verifique seu e-mail</h1><p class="sub">Enviamos um link de confirmação para:</p><p style="font-size:16px;font-weight:700;color:#192318;margin-bottom:20px;word-break:break-all;">${email}</p><div style="background:rgba(45,90,39,.06);border:1.5px solid rgba(45,90,39,.14);border-radius:12px;padding:16px 18px;margin-bottom:24px;"><p style="font-size:13px;color:#555;line-height:1.7;margin:0;"><strong style="color:#2D5A27;">Próximo passo:</strong> Abra seu e-mail, clique em <strong>"Confirmar meu e-mail"</strong> e volte para entrar no dashboard de vendedor.<br/><br/>Não encontrou? Verifique <strong>Spam</strong> ou <strong>Promoções</strong>.</p></div><a href="login-vendedor.html" class="btn" style="text-decoration:none;display:block;text-align:center;">Já confirmei — Entrar</a><p style="font-size:12px;color:#9CA3AF;text-align:center;margin-top:12px;">Não recebeu? <a href="cadastro-vendedor.html" style="color:#2D5A27;font-weight:700;">Tentar novamente</a></p>`;}
async function cadastrar(){
  const b=document.getElementById("btnS"),fn=document.getElementById("fname").value.trim(),ln=document.getElementById("lname").value.trim(),em=document.getElementById("email").value.trim(),ph=document.getElementById("phone").value.trim(),pw=document.getElementById("password").value,p2=document.getElementById("p2").value,t=document.getElementById("terms").checked,cor=document.getElementById("isCor").checked,cr=document.getElementById("creci").value.trim(),im=document.getElementById("imob").value.trim(),rf=document.getElementById("refLink").value.trim();
  if(!fn||!ln)return msg("Preencha seu nome completo.","e");if(!em)return msg("Preencha seu e-mail.","e");if(!ph)return msg("Preencha seu telefone.","e");if(!pw)return msg("Crie uma senha.","e");if(pw.length<8)return msg("A senha precisa ter pelo menos 8 caracteres.","e");if(pw!==p2)return msg("As senhas não coincidem.","e");if(!t)return msg("Aceite os Termos de Uso para continuar.","e");
  b.textContent="Criando conta...";b.disabled=true;
  const{data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{nome:fn,sobrenome:ln,telefone:ph,tipo:"vendedor",eh_corretor:cor,creci:cr||null,imobiliaria:im||null,categoria:"bronze",referido_por:rf||null}}});
  if(error){b.textContent="Criar conta de vendedor";b.disabled=false;const ms={"User already registered":"Este e-mail já está cadastrado. Tente fazer login."};return msg(ms[error.message]||error.message,"e");}
  confirmado(em);
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")cadastrar();});
</script>
</body>
</html>
