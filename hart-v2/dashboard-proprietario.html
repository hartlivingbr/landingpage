<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Área do Proprietário</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { background:#F5F5F7; font-family:"DM Sans",sans-serif; margin:0; }
  .topbar {
    background:var(--dark); height:60px; padding:0 40px;
    display:flex; align-items:center; justify-content:space-between;
    position:fixed; top:0; left:0; right:0; z-index:100;
  }
  .topbar img { height:22px; mix-blend-mode:screen; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-name { font-size:13px; color:rgba(255,255,255,0.65); }
  .topbar-role {
    padding:3px 10px; background:rgba(216,219,142,0.15);
    border:1px solid rgba(216,219,142,0.25); border-radius:100px;
    font-size:10px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; color:#D8DB8E;
  }
  .btn-sair {
    padding:6px 14px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15); border-radius:8px;
    color:rgba(255,255,255,0.6); font-size:12px; font-weight:500;
    cursor:pointer; font-family:"DM Sans",sans-serif; transition:all 0.2s;
  }
  .btn-sair:hover { background:rgba(255,255,255,0.14); color:#fff; }
  .main { max-width:1100px; margin:0 auto; padding:88px 40px 60px; }
  .greeting {
    font-family:"Playfair Display",serif;
    font-size:clamp(28px,3vw,40px); font-weight:700;
    color:var(--dark); letter-spacing:-1px; margin-bottom:6px;
  }
  .greeting em { font-style:italic; color:var(--green); }
  .sub { font-size:14px; color:#8E8E93; margin-bottom:48px; }
  .coming-soon {
    background:#fff; border-radius:20px; padding:64px 40px;
    text-align:center;
    box-shadow:0 0 0 0.5px rgba(0,0,0,0.08), 0 2px 16px rgba(0,0,0,0.06);
  }
  .coming-soon-icon {
    width:64px; height:64px; background:#F5F5F7; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 20px; color:var(--green);
  }
  .coming-soon-icon svg { width:28px; height:28px; }
  .coming-soon h2 {
    font-family:"Playfair Display",serif;
    font-size:28px; font-weight:700; color:var(--dark);
    letter-spacing:-0.8px; margin-bottom:10px;
  }
  .coming-soon h2 em { font-style:italic; color:var(--green); }
  .coming-soon p { font-size:15px; color:#8E8E93; line-height:1.65; max-width:420px; margin:0 auto; }
  #loading {
    position:fixed; inset:0; background:var(--dark);
    display:flex; align-items:center; justify-content:center; z-index:999;
  }
  .loading-logo { height:28px; mix-blend-mode:screen; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
</style>
</head>
<body>

<div id="loading">
  <img class="loading-logo" src="images/Hart_Tipografico_04.png" alt="Hart"/>
</div>

<div class="topbar">
  <a href="index.html"><img src="images/Hart_Tipografico_04.png" alt="Hart"/></a>
  <div class="topbar-right">
    <span class="topbar-name" id="topbar-name">—</span>
    <span class="topbar-role">Proprietário</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</div>

<div class="main">
  <div class="greeting">Olá, <em id="dash-nome">—</em> 👋</div>
  <div class="sub">Área do proprietário Hart — seus imóveis e resultados em um só lugar.</div>

  <div class="coming-soon">
    <div class="coming-soon-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <h2>Dashboard em <em>construção.</em></h2>
    <p>Em breve você acompanha aqui seus imóveis, ocupação, relatórios financeiros e histórico de pagamentos em tempo real.</p>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient("https://suntiyiqskhpppzxhuns.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnRpeWlxc2tocHBwenhodW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTg1NTQsImV4cCI6MjA4OTA5NDU1NH0.skzgdKsg_cdF4XuyIzM86w40PmiBPublYH0i_5vc3Lw");

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return window.location.href = "login-proprietario.html";

  // Verifica se é proprietário — bloqueia vendedor
  const { data: v } = await sb.from("usuarios").select("id,tipo").eq("id", session.user.id).maybeSingle();
  if (v && v.tipo === "vendedor") return window.location.href = "login-proprietario.html";

  const nome = session.user.user_metadata?.full_name || session.user.email.split("@")[0];
  document.getElementById("dash-nome").textContent   = nome;
  document.getElementById("topbar-name").textContent = nome;
  document.getElementById("loading").style.display   = "none";
}

async function sair() {
  await sb.auth.signOut();
  window.location.href = "login-proprietario.html";
}

init();
</script>
</body>
</html>
