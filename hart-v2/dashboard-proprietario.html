<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Entrar</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/login.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<a href="index.html" class="page-logo">
  <img src="images/Hart_Tipografico_04.png" alt="Hart"/>
</a>

<div class="card">
  <div class="card-eyebrow">Área do proprietário</div>
  <h1 class="card-title">Bem-vindo<br>de <em>volta.</em></h1>
  <p class="card-sub">Entre para acompanhar seus imóveis, rendimentos e relatórios em tempo real.</p>

  <div id="msg" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;"></div>

  <div class="form-group">
    <label class="form-label" for="email">E-mail</label>
    <input class="form-input" id="email" type="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="password">Senha</label>
    <div class="input-wrap">
      <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="input-eye" type="button" onclick="togglePwd()" id="eyeBtn" aria-label="Mostrar senha">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div class="form-row-meta">
    <label class="remember-wrap">
      <input type="checkbox" id="remember"/>
      <span>Lembrar de mim</span>
    </label>
    <a href="#" class="forgot-link" id="forgot-link">Esqueci minha senha</a>
  </div>

  <button class="btn-login" type="button" id="btnEntrar" onclick="entrar()">
    Entrar na plataforma
    <span class="btn-login-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </span>
  </button>

  <div class="divider">ou continue com</div>

  <button class="btn-google" type="button" onclick="entrarGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar com Google
  </button>

  <p class="signup-prompt">Não tem conta? <a href="cadastro-proprietario.html">Criar conta</a></p>

  <div class="card-footer">
    <a href="privacidade.html">Privacidade</a>
    <a href="termos.html">Termos de uso</a>
    <a href="https://cal.com/hartbr/reuniao-de-alinhamento" target="_blank">Suporte</a>
  </div>
</div>

<script src="js/login.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient("https://suntiyiqskhpppzxhuns.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnRpeWlxc2tocHBwenhodW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTg1NTQsImV4cCI6MjA4OTA5NDU1NH0.skzgdKsg_cdF4XuyIzM86w40PmiBPublYH0i_5vc3Lw");

// Verifica sessão ativa (inclui retorno do OAuth do Google)
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) return;
  const { data: u } = await sb.from("usuarios").select("id,tipo").eq("id", data.session.user.id).maybeSingle();

  // Vendedor tentando acessar área do proprietário: desloga silenciosamente
  if (u && u.tipo === "vendedor") {
    await sb.auth.signOut();
    showMsg("Esta conta é de vendedor. Acesse o login de parceiros.", "error");
    return;
  }

  // Primeiro login via Google: perfil ainda não existe — cria automaticamente
  if (!u) {
    const meta = data.session.user.user_metadata || {};
    const nome = meta.full_name?.split(" ")[0] || meta.given_name || data.session.user.email.split("@")[0];
    const sobrenome = meta.family_name || meta.full_name?.split(" ").slice(1).join(" ") || "";
    await sb.from("usuarios").upsert({
      id: data.session.user.id,
      nome,
      sobrenome,
      email: data.session.user.email,
      tipo: "proprietario"
    }, { onConflict: "id", ignoreDuplicates: false });
    showMsg("Login com Google realizado! Redirecionando...", "success");
    setTimeout(() => window.location.href = "dashboard-proprietario.html", 1000);
    return;
  }

  // Proprietário já autenticado — redireciona para o dashboard
  // Nota: evitar redirect para a própria página; ajuste a URL quando o dashboard real existir
});

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text; el.style.display = "block";
  el.style.background = type === "error" ? "rgba(229,72,77,0.10)" : "rgba(48,164,108,0.10)";
  el.style.color  = type === "error" ? "#c0392b" : "#1e7e50";
  el.style.border = "1px solid " + (type === "error" ? "rgba(229,72,77,0.25)" : "rgba(48,164,108,0.25)");
}

async function entrar() {
  const btn   = document.getElementById("btnEntrar");
  const email = document.getElementById("email").value.trim();
  const pwd   = document.getElementById("password").value;
  if (!email || !pwd) return showMsg("Preencha e-mail e senha.", "error");

  btn.textContent = "Entrando..."; btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    btn.textContent = "Entrar na plataforma"; btn.disabled = false;
    const msgs = { "Invalid login credentials": "E-mail ou senha incorretos.", "Email not confirmed": "Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada e o spam." };
    return showMsg(msgs[error.message] || error.message, "error");
  }

  // Bloqueia vendedor de entrar aqui
  const { data: u } = await sb.from("usuarios").select("id,tipo").eq("id", data.user.id).maybeSingle();
  if (u && u.tipo === "vendedor") {
    await sb.auth.signOut();
    btn.textContent = "Entrar na plataforma"; btn.disabled = false;
    return showMsg("Esta conta é de vendedor. Acesse o login de parceiros.", "error");
  }

  showMsg("Login realizado! Redirecionando...", "success");
  setTimeout(() => window.location.href = "dashboard-proprietario.html", 1000);
}

async function entrarGoogle() {
  await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin + "/dashboard-proprietario.html" }
  });
}

document.getElementById("forgot-link").onclick = async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  if (!email) return showMsg("Digite seu e-mail acima.", "error");
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/login-proprietario.html"
  });
  if (error) return showMsg(error.message, "error");
  showMsg("E-mail de recuperação enviado!", "success");
};

document.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });
</script>
</body>
</html>
