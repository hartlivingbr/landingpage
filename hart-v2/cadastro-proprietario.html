<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Criar conta</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/login.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="cadastro-page">

<a href="index.html" class="page-logo">
  <img src="images/Hart_Tipografico_04.png" alt="Hart"/>
</a>

<div class="card cadastro-card" id="mainCard">
  <div class="card-eyebrow">Área do proprietário</div>
  <h1 class="card-title">Crie sua conta.</h1>
  <p class="card-sub">Preencha os dados abaixo para acessar a plataforma Hart e acompanhar seus imóveis.</p>

  <div id="msg" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;"></div>

  <div class="name-grid">
    <div class="form-group">
      <label class="form-label" for="fname">Nome</label>
      <input class="form-input" id="fname" type="text" placeholder="João" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="lname">Sobrenome</label>
      <input class="form-input" id="lname" type="text" placeholder="Silva" autocomplete="family-name"/>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="email">E-mail</label>
    <input class="form-input" id="email" type="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>

  <div class="form-group">
    <label class="form-label" for="phone">Telefone / WhatsApp</label>
    <input class="form-input" id="phone" type="tel" placeholder="(11) 9 0000-0000" autocomplete="tel"/>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Senha</label>
    <div class="input-wrap">
      <input class="form-input" id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
      <button class="input-eye" type="button" onclick="togglePwd('password','eyeIcon1')" aria-label="Mostrar senha">
        <svg id="eyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="password-strength" id="strengthBar">
      <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
      <span class="strength-label" id="strengthLabel"></span>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="password2">Confirmar senha</label>
    <div class="input-wrap">
      <input class="form-input" id="password2" type="password" placeholder="Repita a senha" autocomplete="new-password"/>
      <button class="input-eye" type="button" onclick="togglePwd('password2','eyeIcon2')" aria-label="Mostrar senha">
        <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div class="form-row-meta terms-row">
    <label class="remember-wrap">
      <input type="checkbox" id="terms"/>
      <span>Li e aceito os <a href="termos.html" class="forgot-link">Termos de Uso</a> e a <a href="privacidade.html" class="forgot-link">Política de Privacidade</a></span>
    </label>
  </div>

  <button class="btn-login" type="button" id="btnSubmit" onclick="cadastrar()">
    Criar minha conta
    <span class="btn-login-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </span>
  </button>

  <div class="divider">ou continue com</div>

  <button class="btn-google" type="button" onclick="cadastrarGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continuar com Google
  </button>

  <p class="signup-prompt">Já tem conta? <a href="login-proprietario.html">Entrar</a></p>

  <div class="card-footer">
    <a href="privacidade.html">Privacidade</a>
    <a href="termos.html">Termos de uso</a>
    <a href="https://wa.me/5511971755175" target="_blank" rel="noopener">Suporte</a>
  </div>
</div>

<script src="js/cadastro.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  "https://suntiyiqskhpppzxhuns.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnRpeWlxc2tocHBwenhodW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTg1NTQsImV4cCI6MjA4OTA5NDU1NH0.skzgdKsg_cdF4XuyIzM86w40PmiBPublYH0i_5vc3Lw"
);

// Já logado como proprietário? Vai direto pro dashboard
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) return;
  const { data: u } = await sb.from("usuarios").select("tipo").eq("id", data.session.user.id).maybeSingle();
  if (u && u.tipo === "proprietario") window.location.href = "dashboard-proprietario.html";
});

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text; el.style.display = "block";
  el.style.background = type === "error" ? "rgba(229,72,77,0.10)" : "rgba(48,164,108,0.10)";
  el.style.color  = type === "error" ? "#c0392b" : "#1e7e50";
  el.style.border = "1px solid " + (type === "error" ? "rgba(229,72,77,0.25)" : "rgba(48,164,108,0.25)");
}

function mostrarConfirmacao(email) {
  document.getElementById("mainCard").innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="width:72px;height:72px;background:rgba(45,90,39,0.08);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2D5A27" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="card-eyebrow">Conta criada!</div>
      <h1 class="card-title" style="font-size:28px;margin-bottom:8px;">Verifique seu<br><em>e-mail.</em></h1>
      <p class="card-sub" style="margin-bottom:8px;">Enviamos um link de confirmação para:</p>
      <p style="font-size:15px;font-weight:600;color:#1C1C1E;margin-bottom:20px;word-break:break-all;">${email}</p>
      <div style="background:rgba(45,90,39,0.06);border:1px solid rgba(45,90,39,0.12);border-radius:12px;padding:16px 20px;margin-bottom:28px;text-align:left;">
        <p style="font-size:13px;color:#555;line-height:1.6;margin:0;">
          <strong style="color:#2D5A27;">Próximo passo:</strong> Abra seu e-mail, clique em <strong>"Confirmar meu e-mail"</strong> e depois volte aqui para entrar na plataforma.<br/><br/>
          📁 Não encontrou? Verifique a pasta <strong>Spam</strong> ou <strong>Promoções</strong>.
        </p>
      </div>
      <a href="login-proprietario.html" class="btn-login" style="text-decoration:none;display:flex;margin-bottom:16px;">
        Já confirmei — Ir para o login
        <span class="btn-login-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <p style="font-size:12px;color:#8E8E93;">Não recebeu o e-mail? <a href="cadastro-proprietario.html" style="color:#2D5A27;font-weight:600;">Tentar novamente</a></p>
    </div>
  `;
}

async function cadastrar() {
  const btn   = document.getElementById("btnSubmit");
  const fname = document.getElementById("fname").value.trim();
  const lname = document.getElementById("lname").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const pwd   = document.getElementById("password").value;
  const pwd2  = document.getElementById("password2").value;
  const terms = document.getElementById("terms").checked;

  if (!fname || !lname)   return showMsg("Preencha seu nome completo.", "error");
  if (!email)             return showMsg("Preencha seu e-mail.", "error");
  if (!phone)             return showMsg("Preencha seu telefone.", "error");
  if (!pwd)               return showMsg("Crie uma senha.", "error");
  if (pwd.length < 8)     return showMsg("A senha precisa ter pelo menos 8 caracteres.", "error");
  if (pwd !== pwd2)        return showMsg("As senhas não coincidem. Verifique e tente novamente.", "error");
  if (!terms)             return showMsg("Aceite os Termos de Uso para continuar.", "error");

  btn.textContent = "Criando conta..."; btn.disabled = true;

  // Passa dados no metadata — o trigger do banco cria o perfil após confirmação
  const { data, error } = await sb.auth.signUp({
    email,
    password: pwd,
    options: {
      data: {
        nome: fname,
        sobrenome: lname,
        telefone: phone,
        tipo: "proprietario"
      }
    }
  });

  if (error) {
    btn.textContent = "Criar minha conta"; btn.disabled = false;
    const msgs = {
      "User already registered": "Este e-mail já está cadastrado. Tente fazer login.",
      "Email rate limit exceeded": "Muitas tentativas. Aguarde alguns minutos e tente novamente.",
    };
    return showMsg(msgs[error.message] || error.message, "error");
  }

  mostrarConfirmacao(email);
}

async function cadastrarGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin + "/dashboard-proprietario.html" }
  });
  if (error) showMsg("Erro ao conectar com Google. Tente novamente.", "error");
}

document.addEventListener("keydown", e => { if (e.key === "Enter") cadastrar(); });
</script>
</body>
</html>
