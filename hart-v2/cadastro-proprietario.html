<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hart — Criar conta</title>
<link rel="icon" href="images/favicon.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/login.css"/>
</head>
<body class="cadastro-page">

<!-- Logo fixo no topo -->
<a href="index.html" class="page-logo">
  <img src="images/Hart_Tipografico_04.png" alt="Hart"/>
</a>

<!-- Card central -->
<div class="card cadastro-card">
  <div class="card-eyebrow">Área do proprietário</div>
  <h1 class="card-title">Crie sua conta.</h1>
  <p class="card-sub">Preencha os dados abaixo para acessar a plataforma Hart e acompanhar seus imóveis.</p>

  <!-- Nome + Sobrenome -->
  <div class="name-grid">
    <div class="form-group">
      <label class="form-label" for="fname">Nome</label>
      <input class="form-input" id="fname" type="text" placeholder="João" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="lname">Sobrenome</label>
      <input class="form-input" id="lname" type="text" placeholder="Silva" autocomplete="family-name"/>
    </div>
  </div>

  <!-- E-mail -->
  <div class="form-group">
    <label class="form-label" for="email">E-mail</label>
    <input class="form-input" id="email" type="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>

  <!-- Telefone -->
  <div class="form-group">
    <label class="form-label" for="phone">Telefone / WhatsApp</label>
    <input class="form-input" id="phone" type="tel" placeholder="(11) 9 0000-0000" autocomplete="tel"/>
  </div>

  <!-- Senha -->
  <div class="form-group">
    <label class="form-label" for="password">Senha</label>
    <div class="input-wrap">
      <input class="form-input" id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
      <button class="input-eye" type="button" onclick="togglePwd('password','eyeIcon1')" aria-label="Mostrar senha">
        <svg id="eyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="password-strength" id="strengthBar">
      <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
      <span class="strength-label" id="strengthLabel"></span>
    </div>
  </div>

  <!-- Confirmar Senha -->
  <div class="form-group">
    <label class="form-label" for="password2">Confirmar senha</label>
    <div class="input-wrap">
      <input class="form-input" id="password2" type="password" placeholder="Repita a senha" autocomplete="new-password"/>
      <button class="input-eye" type="button" onclick="togglePwd('password2','eyeIcon2')" aria-label="Mostrar senha">
        <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- Termos -->
  <div class="form-row-meta terms-row">
    <label class="remember-wrap">
      <input type="checkbox" id="terms"/>
      <span>Li e aceito os <a href="termos.html" class="forgot-link">Termos de Uso</a> e a <a href="privacidade.html" class="forgot-link">Política de Privacidade</a></span>
    </label>
  </div>

  <!-- Submit -->
  <button class="btn-login" type="submit" id="btnSubmit">
    Criar minha conta
    <span class="btn-login-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </span>
  </button>

  <!-- Divider -->
  <div class="divider">ou continue com</div>

  <!-- Google -->
  <button class="btn-google" type="button">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar com Google
  </button>

  <p class="signup-prompt">Já tem conta? <a href="login.html">Entrar</a></p>

  <div class="card-footer">
    <a href="privacidade.html">Privacidade</a>
    <a href="termos.html">Termos de uso</a>
    <a href="https://cal.com/hartbr/reuniao-de-alinhamento" target="_blank">Suporte</a>
  </div>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
